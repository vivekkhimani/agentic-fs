name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For anything large, please open this issue **before** starting work so we can make sure it fits the roadmap ([docs/agentic-fs-oss-plan.md](https://github.com/vivekkhimani/agentic-fs/blob/master/docs/agentic-fs-oss-plan.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Describe the API/behavior if you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - core (contracts/models)
        - server (API)
        - extractors (extraction pipeline)
        - mcp (MCP server/tools)
        - connectors (ingestion SDK)
        - infra (Terraform/deploy)
        - docs
        - not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to help implement this
          required: false
