name: Release

# Publishes the distributable packages (afs-core, afs-server) to a package
# index. Two paths:
#
#   - push a tag matching v*.*.*  -> publish BOTH packages to PyPI (production)
#   - manual workflow_dispatch    -> publish the chosen package(s) to the chosen
#                                     index. Use this to rehearse on TestPyPI, or
#                                     to bootstrap one package onto an index
#                                     (e.g. publish just afs-core to PyPI to clear
#                                     a pending Trusted Publisher) before
#                                     tag-driven releases publish both together.
#
# Auth is PyPI Trusted Publishing (OIDC) — no API tokens or secrets. `uv
# publish` reads the GitHub OIDC token (id-token: write) automatically; the
# index must have a Trusted Publisher configured for this repo + this workflow
# file + the `pypi` / `testpypi` environment (see the PR description / ADR 0005).
#
# Versioning: each package's pyproject `version` is the single source of truth.
# We tag in lockstep `vX.Y.Z` and that tag MUST equal the version in both
# pyprojects (verified below before any publish).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      index:
        description: 'Index to publish to.'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
      package:
        description: 'Which package(s) to publish.'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - afs-core
          - afs-server
          - afs-connector-sdk

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Verify the tag matches the package versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          for pkg in afs-core afs-server afs-connector-sdk; do
            ver="$(uv version --project "packages/${pkg}" --short)"
            if [ "$ver" != "$tag" ]; then
              echo "::error::Tag v${tag} != ${pkg} version ${ver}. Bump pyproject versions to match the tag."
              exit 1
            fi
            echo "${pkg}: ${ver} == tag ${tag}"
          done

      - name: Build wheels + sdists for all packages
        run: |
          set -euo pipefail
          rm -rf dist
          uv build --package afs-core --out-dir dist
          uv build --package afs-server --out-dir dist
          uv build --package afs-connector-sdk --out-dir dist
          ls -l dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-dispatch:
    # Manual path: publish the chosen package(s) to the chosen index. The
    # environment is selected from the input so it matches the Trusted Publisher
    # configured on that index (pypi | testpypi).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.index }}
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: read
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Download build artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist

      - name: Resolve distributions + index URL
        id: sel
        env:
          PACKAGE: ${{ inputs.package }}
          INDEX: ${{ inputs.index }}
        run: |
          set -euo pipefail
          case "$PACKAGE" in
            afs-core)          echo "glob=dist/afs_core-*"          >> "$GITHUB_OUTPUT" ;;
            afs-server)        echo "glob=dist/afs_server-*"        >> "$GITHUB_OUTPUT" ;;
            afs-connector-sdk) echo "glob=dist/afs_connector_sdk-*" >> "$GITHUB_OUTPUT" ;;
            all)               echo "glob=dist/*"                   >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::unknown package '$PACKAGE'"; exit 1 ;;
          esac
          if [ "$INDEX" = "testpypi" ]; then
            echo "url=--publish-url https://test.pypi.org/legacy/" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (${{ inputs.package }} -> ${{ inputs.index }})
        run: uv publish ${{ steps.sel.outputs.url }} --trusted-publishing always ${{ steps.sel.outputs.glob }}

  publish-pypi:
    # Production path: only on a v*.*.* tag push.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: read
    steps:
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Download build artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always dist/*
