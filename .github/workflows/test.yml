name: Python

# Runs on every PR (no path filter) so it can be a required status check without
# deadlocking PRs that don't touch packages/. It's fast (~1 min).
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check packages/

      - name: Ruff format check
        run: uv run ruff format --check packages/

      - name: Pytest
        run: uv run pytest packages -q
