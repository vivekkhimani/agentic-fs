name: Terraform Drift Check

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 2pm UTC (9am EST)
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  issues: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.10.5'
  TF_IN_AUTOMATION: 'true'
  TF_ROOT: terraform/examples/quickstart

jobs:
  drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -input=false

      - name: Plan (detect drift)
        id: plan
        run: |
          set +e
          # -detailed-exitcode: 0 = no changes, 1 = error, 2 = drift
          terraform plan -input=false -no-color -detailed-exitcode -var aws_region=${{ env.AWS_REGION }} 2>&1 | tee /tmp/drift.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: steps.plan.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/drift.txt', 'utf8');
            const title = 'Terraform Drift Detected — quickstart';
            const body = [
              '## Terraform Drift — quickstart (sandbox)',
              '',
              'Live AWS no longer matches Terraform state. Resources were changed',
              'outside Terraform (console, CLI, or another tool). Review and either',
              'reconcile the config or revert the manual change.',
              '',
              '<details><summary>Plan</summary>', '', '```', diff, '```', '', '</details>',
              '',
              `*Auto-generated by \`terraform-drift.yml\` — ${context.sha.slice(0, 7)}*`,
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'infra-drift',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['infra-drift'] });
            }

      - name: Fail job on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1
