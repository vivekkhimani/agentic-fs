name: Images

# Publish the API + worker container images to GHCR. Maintainer-only by
# construction: it runs on a `v*` release tag (only maintainers push tags) or a
# manual dispatch (GitHub requires write access to trigger), and is guarded to the
# canonical repo. GHCR auth uses the built-in GITHUB_TOKEN — no secrets, no AWS.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version, e.g. 1.0.0 (used to backfill / re-publish)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    if: github.repository_owner == 'vivekkhimani'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agentic-fs:${{ steps.v.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agentic-fs:latest

      - name: Build + push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64
          push: true
          # Slim default rungs (text_native,pdf,docx,textract). Build the docling
          # variant separately if you want the heavy ML extractors.
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agentic-fs-worker:${{ steps.v.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/agentic-fs-worker:latest
