name: Terraform

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [master]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform on the sandbox quickstart'
        required: true
        type: choice
        options: [plan, apply]
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.10.5'
  TF_IN_AUTOMATION: 'true'
  # The CI-managed root. Global roots (global/bootstrap, global/ci-roles) are
  # admin-applied — CI deliberately lacks permission to mutate state/IAM.
  TF_ROOT: terraform/examples/quickstart

jobs:
  # ---------------------------------------------------------------------------
  # Credential-free static checks. Runs on every PR (including forks) — no AWS
  # access, no backend init, so it can never touch infrastructure.
  # ---------------------------------------------------------------------------
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Validate every root (no backend)
        run: |
          set -e
          for root in global/bootstrap global/ci-roles examples/quickstart; do
            echo "::group::validate $root"
            terraform -chdir="$root" init -backend=false -input=false
            terraform -chdir="$root" validate -no-color
            echo "::endgroup::"
          done
        working-directory: terraform

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: latest
      - name: tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --no-color

      - name: trivy (IaC misconfiguration scan)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: '1'

  # ---------------------------------------------------------------------------
  # PR plan against the sandbox state. Skipped for fork PRs (which cannot assume
  # the OIDC role). Read-only — uses the plan role, which cannot mutate infra.
  # ---------------------------------------------------------------------------
  plan:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Read-only role — plans cannot mutate infrastructure.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -input=false

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -input=false -no-color -var aws_region=${{ env.AWS_REGION }} -out=tfplan 2>&1 | tee /tmp/plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const planPath = '/tmp/plan.txt';
            const plan = fs.existsSync(planPath)
              ? fs.readFileSync(planPath, 'utf8')
              : '⚠️ Plan did not produce output — an earlier step (init/validate) failed. See the job log.';
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated — see job log)' : plan;
            const marker = '### Terraform Plan — quickstart';
            const body = `${marker}\n\n\`\`\`\n${truncated}\n\`\`\`\n\n*Auto-generated by \`terraform.yml\` on ${context.sha.slice(0, 7)}*`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Merge to master: auto-apply the sandbox quickstart. Plans and applies
  # atomically in one job so the applied plan is exactly what was just computed.
  # The `sandbox` GitHub Environment carries the approval gate AND is what the
  # apply role's OIDC trust is restricted to.
  # ---------------------------------------------------------------------------
  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: sandbox
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -input=false
      - run: terraform plan -input=false -var aws_region=${{ env.AWS_REGION }} -out=tfplan
      - run: terraform apply -input=false -auto-approve tfplan

  # ---------------------------------------------------------------------------
  # Manual dispatch: plan or apply the sandbox quickstart on demand. Apply path
  # runs in the gated `sandbox` Environment.
  # ---------------------------------------------------------------------------
  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: sandbox
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-terraform-apply
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: terraform init -input=false
      - run: terraform plan -input=false -var aws_region=${{ env.AWS_REGION }} -out=tfplan

      - name: Apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan
