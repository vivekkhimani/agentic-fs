name: Terraform

# Account-free CI: fmt + validate + tflint + trivy, with no AWS credentials and no
# backend init — so it can never touch infrastructure. Deploying is the operator's
# job from their own checkout (see terraform/README.md), not this repo's CI.
# Runs on every PR (no path filter) so `validate` can be a required status check
# without deadlocking PRs that don't touch terraform/. It's credential-free.
on:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  TF_VERSION: '1.10.5'
  TF_IN_AUTOMATION: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Validate every root (no backend)
        run: |
          set -e
          for root in global/bootstrap global/ci-roles examples/quickstart examples/full examples/hardened; do
            [ -f "$root/terraform.tf" ] || continue
            echo "::group::validate $root"
            terraform -chdir="$root" init -backend=false -input=false
            terraform -chdir="$root" validate -no-color
            echo "::endgroup::"
          done
        working-directory: terraform

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: latest
      - name: tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --no-color

      - name: trivy (IaC misconfiguration scan)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: '1'
