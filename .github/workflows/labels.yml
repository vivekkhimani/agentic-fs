name: Sync labels

# Keeps the repo's labels in sync with .github/labels.yml.
# Runs on changes to the manifest, and can be triggered manually.

on:
  push:
    branches: [master]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          # Flip to false to prune any label not in the manifest.
          skip-delete: true
          dry-run: false
