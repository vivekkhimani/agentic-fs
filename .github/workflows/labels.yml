name: Sync labels

# Keeps the repo's labels in sync with .github/labels.yml.
# Runs on changes to the manifest, and can be triggered manually.

on:
  push:
    branches: [master]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/labels.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: crazy-max/ghaction-github-labeler@24d110aa46a59976b8a7f35518cb7f14f434c916 # v5.3.0
        with:
          yaml-file: .github/labels.yml
          # Flip to false to prune any label not in the manifest.
          skip-delete: true
          dry-run: false
