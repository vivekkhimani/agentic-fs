name: Website

# Validate on PR (credential-free); deploy ONLY on a deliberate, owner-gated
# manual run — a fork or a routine merge never deploys.
on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.10.5'

jobs:
  site-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform fmt + validate (no backend)
        working-directory: web/infra
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate -no-color
      - name: Site sanity check
        run: test -f web/site/index.html && test -f web/site/styles.css

  deploy:
    if: github.event_name == 'workflow_dispatch' && github.repository_owner == 'vivekkhimani'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.SITE_AWS_ACCOUNT_ID }}:role/agenticfs-site-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync site to S3
        run: aws s3 sync web/site/ "s3://${{ vars.SITE_BUCKET }}/" --delete --cache-control "public,max-age=300"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.SITE_DISTRIBUTION_ID }}" --paths '/*'
