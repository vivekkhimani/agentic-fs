name: Image

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/image.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: agentic-fs-api

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    # The image-push role's OIDC trust is restricted to this environment.
    environment: sandbox
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-ci-image-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push (immutable git-SHA tag)
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::12}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE"

      - name: Roll the Lambda to the new image (if it exists)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail
          if aws lambda get-function --function-name "$IMAGE_NAME" >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name "$IMAGE_NAME" --image-uri "$IMAGE" --publish >/dev/null
            echo "Rolled $IMAGE_NAME to $IMAGE"
          else
            echo "Lambda $IMAGE_NAME not created yet — image pushed only."
            echo "Create it with: terraform apply -var enable_compute=true -var image_tag=${GITHUB_SHA::12}"
          fi
