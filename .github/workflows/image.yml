name: Image

on:
  push:
    branches: [master]
    paths:
      - 'packages/**'
      - 'Dockerfile'
      - 'Dockerfile.worker'
      - '.dockerignore'
      - '.github/workflows/image.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: agentic-fs-api

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    # The image-push role's OIDC trust is restricted to this environment.
    environment: sandbox
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-ci-image-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push (immutable git-SHA tag)
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::12}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          docker build --platform linux/amd64 -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE"

      - name: Roll the Lambda to the new image (if it exists)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail
          # Distinguish "not created yet" (skip gracefully) from any other failure
          # (e.g. AccessDenied) which must fail LOUD — a silently-swallowed roll
          # error is how a stale Lambda hid for hours.
          if err=$(aws lambda get-function --function-name "$IMAGE_NAME" 2>&1 >/dev/null); then
            aws lambda update-function-code \
              --function-name "$IMAGE_NAME" --image-uri "$IMAGE" --publish >/dev/null
            echo "Rolled $IMAGE_NAME to $IMAGE"
          elif printf '%s' "$err" | grep -q 'ResourceNotFoundException'; then
            echo "Lambda $IMAGE_NAME not created yet — image pushed only."
            echo "Create it with: terraform apply -var enable_compute=true -var image_tag=${GITHUB_SHA::12}"
          else
            echo "::error::Cannot roll $IMAGE_NAME — get-function failed: $err"
            exit 1
          fi

  # The extractor-worker image. Builds the slim default (afs-server[textract] —
  # managed OCR, no torch) via Dockerfile.worker's default build args; opt into
  # heavier rungs (docling/rapidocr) with --build-arg AFS_EXTRAS=... in your own
  # build. Separate job so it runs in parallel and never blocks the serving
  # deploy. Same ECR repo, a `worker-` tag (the repo enforces immutable tags).
  # Rolls agentic-fs-worker once the ingestion module has created it (ADR 0009).
  build-push-worker:
    runs-on: ubuntu-latest
    environment: sandbox
    env:
      WORKER_NAME: agentic-fs-worker
      RECONCILER_NAME: agentic-fs-reconciler
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/agentic-fs-ci-image-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push the worker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}:worker-${GITHUB_SHA::12}"
          docker build --platform linux/amd64 -f Dockerfile.worker -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE"

      - name: Roll the worker Lambda to the new image (if it exists)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail
          # See the API roll step: not-created skips gracefully; anything else
          # (AccessDenied, etc.) fails LOUD instead of being swallowed.
          if err=$(aws lambda get-function --function-name "$WORKER_NAME" 2>&1 >/dev/null); then
            aws lambda update-function-code \
              --function-name "$WORKER_NAME" --image-uri "$IMAGE" --publish >/dev/null
            echo "Rolled $WORKER_NAME to $IMAGE"
          elif printf '%s' "$err" | grep -q 'ResourceNotFoundException'; then
            echo "Lambda $WORKER_NAME not created yet — image pushed only (create via the ingestion module)."
          else
            echo "::error::Cannot roll $WORKER_NAME — get-function failed: $err"
            exit 1
          fi

      - name: Roll the reconciler Lambda to the new image (if it exists)
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail
          # The reconciler runs the same worker image (different handler), so it
          # rolls to the same tag. Same loud-on-error contract as the worker.
          if err=$(aws lambda get-function --function-name "$RECONCILER_NAME" 2>&1 >/dev/null); then
            aws lambda update-function-code \
              --function-name "$RECONCILER_NAME" --image-uri "$IMAGE" --publish >/dev/null
            echo "Rolled $RECONCILER_NAME to $IMAGE"
          elif printf '%s' "$err" | grep -q 'ResourceNotFoundException'; then
            echo "Lambda $RECONCILER_NAME not created yet — image pushed only (create via the ingestion module)."
          else
            echo "::error::Cannot roll $RECONCILER_NAME — get-function failed: $err"
            exit 1
          fi
