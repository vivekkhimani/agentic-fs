name: Labeler

# Auto-applies area labels to PRs based on the files they touch (.github/labeler.yml).
# pull_request_target so it also works for PRs opened from forks. The labeler action
# never checks out or runs PR code, so this is safe.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
        with:
          sync-labels: true
