name: Labeler

# Auto-applies area labels to PRs based on the files they touch (.github/labeler.yml).
# pull_request_target so it also works for PRs opened from forks. The labeler action
# never checks out or runs PR code, so this is safe.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          sync-labels: true
