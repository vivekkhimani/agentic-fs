[project]
name = "afs-server"
version = "0.1.0"
description = "agentic-fs server: stores, services, REST + MCP. Implements the afs-core contracts."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Vivek Khimani", email = "vivekkhimani07@gmail.com" }]
keywords = [
    "agentic-fs",
    "agents",
    "mcp",
    "fastapi",
    "s3",
    "dynamodb",
    "filesystem",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
    "Framework :: FastAPI",
]
dependencies = [
    "afs-core",
    "boto3>=1.34",
    "pydantic-settings>=2.2",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "fastmcp>=2",
    # Lightweight extraction rungs (pure-Python / a small binary, no ML) so common
    # files extract synchronously in-request. Heavier docling stays the `docling` extra.
    "pypdfium2>=4",
    "python-docx>=1",
]

[project.optional-dependencies]
# Rich extraction (PDF / Office / images) via Docling — pulls heavy ML deps, so
# it's opt-in. Enable the rung with AFS_EXTRACTION_LADDER=text_native,docling.
# torch/torchvision are listed explicitly (they're docling transitives) so the
# CPU-wheel pin in [tool.uv.sources] applies — see the root pyproject.
docling = ["docling>=2", "torch", "torchvision"]
# Reserved for future backends. Intentionally empty until the dependencies
# exist — declaring the names now keeps the install surface stable.
# TODO: add the Postgres catalog backend deps when that store lands.
postgres = []
# TODO: add the search/vector backend deps when that store lands.
search = []

[project.urls]
Homepage = "https://github.com/vivekkhimani/agentic-fs"
Repository = "https://github.com/vivekkhimani/agentic-fs"
Issues = "https://github.com/vivekkhimani/agentic-fs/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/afs_server"]

[tool.uv.sources]
afs-core = { workspace = true }
# CPU-only torch (no CUDA) — the index is declared in the root pyproject.
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }
