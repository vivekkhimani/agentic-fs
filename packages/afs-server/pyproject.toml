[project]
name = "afs-server"
version = "1.0.1"
description = "agentic-fs server: stores, services, REST + MCP. Implements the afs-core contracts."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Vivek Khimani", email = "vivekkhimani07@gmail.com" }]
keywords = [
    "agentic-fs",
    "agents",
    "mcp",
    "fastapi",
    "s3",
    "dynamodb",
    "filesystem",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
    "Framework :: FastAPI",
]
dependencies = [
    "afs-core>=1.0.0",
    "boto3>=1.34",
    "pydantic-settings>=2.2",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "fastmcp>=2",
    # The `afs` admin CLI.
    "click>=8",
    # JWT decode/verify for the OAuth resource server + `afs auth doctor` (ADR 0013).
    # Already a fastmcp transitive; declared directly since we import it.
    "PyJWT>=2",
    # Structured logging — JSON to CloudWatch (queryable), console in dev. Pure
    # Python, MIT/Apache-2.0. Stdlib loggers bridge through it (logging_config).
    "structlog>=24",
    # Lightweight extraction rungs (pure-Python / a small binary, no ML) so common
    # files extract synchronously in-request. Heavier docling stays the `docling` extra.
    # Capped below the next major: pypdfium2 ships breaking API cleanups on major
    # bumps (the v4->v5 rework). We track 5.x (verified against the pdf rung); a
    # future v6 must be re-validated before it reaches consumers.
    "pypdfium2>=4,<6",
    "python-docx>=1",
]

[project.scripts]
afs = "afs_server.cli:main"

[project.optional-dependencies]
# fsspec object-store adapter (ADR 0014): one store over GCS/Azure/HDFS/local/etc.
# fsspec core only — add the matching backend per target (gcsfs, adlfs, …).
fsspec = ["fsspec>=2024.6"]
# Rich extraction (PDF / Office / images) via Docling — pulls heavy ML deps, so
# it's opt-in. Enable the rung with AFS_EXTRACTION_LADDER=text_native,docling.
# torch/torchvision are listed explicitly (they're docling transitives) so the
# CPU-wheel pin in [tool.uv.sources] applies — see the root pyproject.
docling = ["docling>=2", "torch", "torchvision"]
# AWS Textract OCR rung (managed; no local ML). boto3 is already a base dep; this
# adds Pillow for rasterizing PDF pages before OCR.
textract = ["pillow>=10"]
# Tesseract OCR rung (lightweight, self-hosted). Also requires the tesseract
# system binary at runtime (not a pip dep).
tesseract = ["pytesseract>=0.3", "pillow>=10"]
# RapidOCR rung — PaddleOCR-quality OCR on ONNX (no torch). Pulls onnxruntime +
# opencv + numpy; opencv needs X11/GL system libs at runtime.
rapidocr = ["rapidocr-onnxruntime>=1.3", "pillow>=10"]
# Richer born-digital PDF extraction (tables) via pdfplumber. Pure-Python, MIT.
pdftables = ["pdfplumber>=0.11"]
# LLM extraction rung (batteries-included multimodal — preserves tables AND
# describes diagrams). Pick the provider you use; the `llm` rung lazy-imports the
# selected SDK and reads its standard API-key env var. Pillow is needed to
# rasterize PDF pages (as for the textract rung).
anthropic = ["anthropic>=0.40", "pillow>=10"]
openai = ["openai>=1.50", "pillow>=10"]
# Haystack pipeline engine (ADR 0010) — configurable, branching extraction
# pipelines (routers, YAML). Opt-in via AFS_PIPELINE_ENGINE=haystack until it
# becomes the default; the core install is light (no ML).
haystack = ["haystack-ai>=2.30.2"]
# Reserved for future backends. Intentionally empty until the dependencies
# exist — declaring the names now keeps the install surface stable.
# TODO: add the Postgres catalog backend deps when that store lands.
postgres = []
# TODO: add the search/vector backend deps when that store lands.
search = []

[project.urls]
Homepage = "https://github.com/vivekkhimani/agentic-fs"
Repository = "https://github.com/vivekkhimani/agentic-fs"
Issues = "https://github.com/vivekkhimani/agentic-fs/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/afs_server"]

[tool.uv.sources]
afs-core = { workspace = true }
# CPU-only torch (no CUDA) — the index is declared in the root pyproject.
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }
