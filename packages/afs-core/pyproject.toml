[project]
name = "afs-core"
version = "0.1.0"
description = "agentic-fs core contracts, DTOs, key scheme, and conformance kits. Depends on pydantic only."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/afs_core"]
