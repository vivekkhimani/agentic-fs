# Local development stack: the agentic-fs API against MinIO (S3) + DynamoDB Local.
# Ports bind to 127.0.0.1 only. Dev credentials are dummy values, not secrets.
#
#   docker compose up --build       # start everything
#   curl localhost:8080/v1/healthz  # the API

services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: local
      MINIO_ROOT_PASSWORD: localsecret
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  dynamodb:
    image: amazon/dynamodb-local:2.5.4
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true

  # One-shot aws CLI for `make seed` (create bucket + table). In the "tools"
  # profile so it never starts on `docker compose up`; invoked via
  # `docker compose run --rm awscli ...`. Dummy creds, local endpoints only.
  awscli:
    image: amazon/aws-cli:2.27.0
    profiles: ["tools"]
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: localsecret
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["aws"]

  api:
    build:
      context: .
      target: runtime
    depends_on:
      minio:
        condition: service_healthy
      dynamodb:
        condition: service_started
    environment:
      AFS_OBJECT_STORE_BACKEND: s3
      AFS_S3_ENDPOINT_URL: http://minio:9000
      AFS_DATA_BUCKET: agentic-fs-data
      AFS_CATALOG_BACKEND: dynamodb
      AFS_DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
      AFS_CATALOG_TABLE: agentic-fs-catalog
      AFS_AUTH_MODE: dev
      # Dummy creds for the local endpoints (not secrets).
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: localsecret
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "127.0.0.1:8080:8080"
    security_opt:
      - no-new-privileges:true

volumes:
  minio-data:
