# uv workspace root. Holds shared tool config + the dev dependency group; the
# distributable packages live under packages/* (see docs/agentic-fs-oss-plan.md
# §2.4). The root itself is not a published package.

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
package = false

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
    "moto[s3]>=5",
    "httpx>=0.27",
    # Pinned below 49 so a prebuilt macOS wheel is used in local dev (49.0.0's
    # wheel tags require a newer base than our toolchain resolves to). CI on
    # Linux is unaffected. moto only needs cryptography for request signing.
    "cryptography>=43,<45",
]
# Maintainer-only release tooling — not synced by a normal `uv sync`. The
# commit-msg pre-commit hook brings its own commitizen, so contributors don't
# need this; only `uv run --group release cz bump` (at release time) does.
release = ["commitizen>=4"]

# --- Shared lint/format config (packages inherit this by config discovery) ---
[tool.ruff]
line-length = 100
target-version = "py312"
src = ["packages/*/src", "packages/*/tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W", # pyflakes / pycodestyle
    "I", # isort
    "UP", # pyupgrade
    "B", # bugbear
    "SIM", # simplify
    "TID", # tidy-imports
    "RUF", # ruff-specific
]

[tool.ruff.lint.isort]
known-first-party = ["afs_core", "afs_server", "afs_connector_sdk"]

# --- Type checker (Astral ty) ---
[tool.ty.environment]
python-version = "3.12"

# --- Tests ---
[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["packages"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

# --- Versioning: Commitizen computes the SemVer bump from Conventional Commits ---
# `uv run cz bump` reads commits since the last tag, bumps BOTH packages in
# lockstep, updates CHANGELOG.md, and tags vX.Y.Z (which release.yml publishes).
# major_version_zero keeps breaking changes at a MINOR bump while we're on 0.x.
[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
version_scheme = "semver"
major_version_zero = true
tag_format = "v$version"
update_changelog_on_bump = true
version_files = [
    "packages/afs-core/pyproject.toml:^version =",
    "packages/afs-server/pyproject.toml:^version =",
    "packages/afs-connector-sdk/pyproject.toml:^version =",
]
